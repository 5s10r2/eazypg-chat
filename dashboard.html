<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OxOtel — Analytics Dashboard</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>📊</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f8fafc;
      --header-bg: #0a0a0a;
      --card-bg: #ffffff;
      --border: #e2e8f0;
      --text: #0f172a;
      --text-light: #64748b;
      --accent: #0070f3;
      --green: #10b981;
      --amber: #f59e0b;
      --red: #ef4444;
      --font: 'Geist', 'Inter', -apple-system, system-ui, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Header ─── */
    .header {
      background: var(--header-bg);
      color: #fff;
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-avatar { font-size: 20px; }
    .header-title { font-weight: 600; font-size: 16px; flex: 1; }
    .header-link {
      color: rgba(255,255,255,0.55);
      text-decoration: none;
      font-size: 12px;
      border: 1px solid rgba(255,255,255,0.15);
      padding: 5px 12px;
      border-radius: 6px;
      transition: all 0.15s;
    }
    .header-link:hover {
      color: #fff;
      border-color: rgba(255,255,255,0.35);
    }

    /* ─── Controls ─── */
    .controls {
      max-width: 1200px;
      margin: 20px auto 0;
      padding: 0 20px;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .range-btn {
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--card-bg);
      font-family: var(--font);
      font-size: 12px;
      font-weight: 500;
      color: var(--text-light);
      cursor: pointer;
      transition: all 0.15s;
    }
    .range-btn:hover { border-color: var(--accent); color: var(--accent); }
    .range-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .refresh-btn {
      margin-left: auto;
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--card-bg);
      font-family: var(--font);
      font-size: 12px;
      cursor: pointer;
      color: var(--text-light);
      transition: all 0.15s;
    }
    .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
    .status-text {
      font-size: 11px;
      color: var(--text-light);
    }

    /* ─── KPI Cards ─── */
    .kpi-grid {
      max-width: 1200px;
      margin: 16px auto;
      padding: 0 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
    }
    .kpi-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 20px;
    }
    .kpi-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .kpi-value {
      font-size: 28px;
      font-weight: 700;
      margin-top: 4px;
      letter-spacing: -0.02em;
    }
    .kpi-sub {
      font-size: 11px;
      color: var(--text-light);
      margin-top: 2px;
    }

    /* ─── Chart Grid ─── */
    .chart-grid {
      max-width: 1200px;
      margin: 0 auto 32px;
      padding: 0 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
      gap: 12px;
    }
    .chart-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
    }
    .chart-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 14px;
    }
    .chart-canvas-wrap {
      position: relative;
      height: 260px;
    }
    .chart-canvas-wrap canvas {
      width: 100% !important;
      height: 100% !important;
    }

    /* ─── Rate Limit ─── */
    .rate-section {
      max-width: 1200px;
      margin: 0 auto 32px;
      padding: 0 20px;
    }
    .rate-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 20px;
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }
    .rate-item { flex: 1; min-width: 150px; }
    .rate-label { font-size: 11px; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.05em; }
    .rate-bar-bg {
      height: 6px;
      background: #e2e8f0;
      border-radius: 3px;
      margin-top: 6px;
      overflow: hidden;
    }
    .rate-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.4s;
    }
    .rate-text { font-size: 12px; margin-top: 4px; color: var(--text); font-weight: 500; }

    /* ─── Loading / Empty ─── */
    .loading-overlay {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-light);
      font-size: 14px;
    }
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-light);
      font-size: 13px;
    }

    @media (max-width: 600px) {
      .chart-grid { grid-template-columns: 1fr; }
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
      .controls { flex-wrap: wrap; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <span class="header-avatar">📊</span>
    <span class="header-title">OxOtel Analytics</span>
    <a href="/" class="header-link">← Chat</a>
  </div>

  <!-- Time Range Controls -->
  <div class="controls" id="controls">
    <button class="range-btn" data-range="today" onclick="loadData('today')">Today</button>
    <button class="range-btn active" data-range="7d" onclick="loadData('7d')">7 Days</button>
    <button class="range-btn" data-range="30d" onclick="loadData('30d')">30 Days</button>
    <button class="refresh-btn" onclick="loadData(currentRange)">↻ Refresh</button>
    <span class="status-text" id="statusText"></span>
  </div>

  <!-- KPI Cards -->
  <div class="kpi-grid" id="kpiGrid">
    <div class="kpi-card">
      <div class="kpi-label">Total Messages</div>
      <div class="kpi-value" id="kpiMessages">—</div>
      <div class="kpi-sub" id="kpiMessagesSub"></div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Searches</div>
      <div class="kpi-value" id="kpiSearches">—</div>
      <div class="kpi-sub">Property searches</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Bookings</div>
      <div class="kpi-value" id="kpiBookings">—</div>
      <div class="kpi-sub">Visit bookings</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Satisfaction</div>
      <div class="kpi-value" id="kpiSatisfaction">—</div>
      <div class="kpi-sub" id="kpiSatisfactionSub"></div>
    </div>
  </div>

  <!-- Charts -->
  <div class="chart-grid">
    <div class="chart-card">
      <div class="chart-title">Conversion Funnel</div>
      <div class="chart-canvas-wrap"><canvas id="funnelChart"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Message Volume</div>
      <div class="chart-canvas-wrap"><canvas id="volumeChart"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Agent Distribution</div>
      <div class="chart-canvas-wrap"><canvas id="agentChart"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Feedback by Agent</div>
      <div class="chart-canvas-wrap"><canvas id="feedbackChart"></canvas></div>
    </div>
  </div>

  <!-- Rate Limits -->
  <div class="rate-section">
    <div class="rate-card" id="rateCard">
      <div class="rate-item">
        <div class="rate-label">Rate Limit Usage</div>
        <div class="rate-bar-bg"><div class="rate-bar-fill" id="rateFill" style="width:0;background:var(--green)"></div></div>
        <div class="rate-text" id="rateText">Loading…</div>
      </div>
    </div>
  </div>

  <script>
    let currentRange = "7d";
    const charts = {};

    // ─── Chart.js defaults ───
    Chart.defaults.font.family = "'Geist', 'Inter', -apple-system, sans-serif";
    Chart.defaults.font.size = 11;
    Chart.defaults.plugins.legend.labels.usePointStyle = true;
    Chart.defaults.plugins.legend.labels.pointStyleWidth = 8;

    const COLORS = {
      blue: "#0070f3",
      green: "#10b981",
      amber: "#f59e0b",
      red: "#ef4444",
      purple: "#8b5cf6",
      cyan: "#06b6d4",
      slate: "#64748b",
    };

    // ─── Load Data ───
    async function loadData(range) {
      currentRange = range;

      // Update active button
      document.querySelectorAll(".range-btn").forEach(b => {
        b.classList.toggle("active", b.dataset.range === range);
      });

      document.getElementById("statusText").textContent = "Loading…";

      try {
        const res = await fetch(`/api/analytics?time_range=${range}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        renderDashboard(data);
        document.getElementById("statusText").textContent =
          `Updated ${new Date().toLocaleTimeString()}`;
      } catch (err) {
        console.error("Failed to load analytics:", err);
        document.getElementById("statusText").textContent =
          "Failed to load data";
      }
    }

    // ─── Render Dashboard ───
    function renderDashboard(data) {
      renderKPIs(data);
      renderFunnelChart(data.funnel || {});
      renderVolumeChart(data.messages || {});
      renderAgentChart(data.agents || {});
      renderFeedbackChart(data.feedback || {});
      renderRateLimits(data.rate_limits || {});
    }

    // ─── KPIs ───
    function renderKPIs(data) {
      const msgs = data.messages || {};
      const totalMsgs = Object.values(msgs).reduce((a, b) => a + b, 0);
      const days = Object.keys(msgs).length || 1;
      document.getElementById("kpiMessages").textContent = totalMsgs.toLocaleString();
      document.getElementById("kpiMessagesSub").textContent =
        `~${Math.round(totalMsgs / days)}/day avg`;

      const funnel = data.funnel || {};
      document.getElementById("kpiSearches").textContent =
        (funnel.search || 0).toLocaleString();
      document.getElementById("kpiBookings").textContent =
        (funnel.booking || 0).toLocaleString();

      const fb = data.feedback || {};
      const totalUp = fb["total:up"] || 0;
      const totalDown = fb["total:down"] || 0;
      const totalFb = totalUp + totalDown;
      if (totalFb > 0) {
        const pct = Math.round((totalUp / totalFb) * 100);
        document.getElementById("kpiSatisfaction").textContent = pct + "%";
        document.getElementById("kpiSatisfactionSub").textContent =
          `${totalUp} 👍 / ${totalDown} 👎`;
      } else {
        document.getElementById("kpiSatisfaction").textContent = "—";
        document.getElementById("kpiSatisfactionSub").textContent = "No feedback yet";
      }
    }

    // ─── Funnel Chart ───
    function renderFunnelChart(funnel) {
      const labels = ["Search", "Detail", "Shortlist", "Visit", "Booking"];
      const keys   = ["search", "detail", "shortlist", "visit", "booking"];
      const values = keys.map(k => funnel[k] || 0);

      if (charts.funnel) charts.funnel.destroy();
      charts.funnel = new Chart(document.getElementById("funnelChart"), {
        type: "bar",
        data: {
          labels,
          datasets: [{
            data: values,
            backgroundColor: [COLORS.blue, COLORS.cyan, COLORS.amber, COLORS.purple, COLORS.green],
            borderRadius: 4,
            barPercentage: 0.7,
          }]
        },
        options: {
          indexAxis: "y",
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                afterLabel: (ctx) => {
                  const searchVal = funnel.search || 1;
                  const pct = Math.round((ctx.raw / searchVal) * 100);
                  return `${pct}% of searches`;
                }
              }
            }
          },
          scales: {
            x: { grid: { display: false }, ticks: { precision: 0 } },
            y: { grid: { display: false } }
          }
        }
      });
    }

    // ─── Volume Chart ───
    function renderVolumeChart(messages) {
      const sortedDates = Object.keys(messages).sort();
      const labels = sortedDates.map(d => {
        const dt = new Date(d + "T00:00:00");
        return dt.toLocaleDateString("en-IN", { month: "short", day: "numeric" });
      });
      const values = sortedDates.map(d => messages[d]);

      if (charts.volume) charts.volume.destroy();
      charts.volume = new Chart(document.getElementById("volumeChart"), {
        type: "line",
        data: {
          labels,
          datasets: [{
            label: "Messages",
            data: values,
            borderColor: COLORS.blue,
            backgroundColor: "rgba(0,112,243,0.08)",
            fill: true,
            tension: 0.35,
            pointRadius: 3,
            pointBackgroundColor: COLORS.blue,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { display: false } },
            y: { beginAtZero: true, grid: { color: "#f1f5f9" }, ticks: { precision: 0 } }
          }
        }
      });
    }

    // ─── Agent Chart ───
    function renderAgentChart(agents) {
      const agentLabels = Object.keys(agents);
      const agentValues = Object.values(agents);
      const agentColors = [COLORS.blue, COLORS.green, COLORS.amber, COLORS.purple, COLORS.cyan, COLORS.red];

      if (!agentLabels.length) {
        agentLabels.push("No data");
        agentValues.push(1);
      }

      if (charts.agent) charts.agent.destroy();
      charts.agent = new Chart(document.getElementById("agentChart"), {
        type: "doughnut",
        data: {
          labels: agentLabels.map(l => l.charAt(0).toUpperCase() + l.slice(1)),
          datasets: [{
            data: agentValues,
            backgroundColor: agentColors.slice(0, agentLabels.length),
            borderWidth: 0,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          cutout: "60%",
          plugins: {
            legend: { position: "right" }
          }
        }
      });
    }

    // ─── Feedback Chart ───
    function renderFeedbackChart(feedback) {
      // Extract per-agent feedback
      const agentNames = new Set();
      for (const key of Object.keys(feedback)) {
        const [agent] = key.split(":");
        if (agent !== "total") agentNames.add(agent);
      }
      const agents = [...agentNames];
      if (!agents.length) agents.push("broker", "booking", "profile");

      const upData   = agents.map(a => feedback[`${a}:up`]   || 0);
      const downData = agents.map(a => feedback[`${a}:down`] || 0);

      if (charts.feedback) charts.feedback.destroy();
      charts.feedback = new Chart(document.getElementById("feedbackChart"), {
        type: "bar",
        data: {
          labels: agents.map(a => a.charAt(0).toUpperCase() + a.slice(1)),
          datasets: [
            {
              label: "👍 Positive",
              data: upData,
              backgroundColor: COLORS.green,
              borderRadius: 4,
              barPercentage: 0.6,
            },
            {
              label: "👎 Negative",
              data: downData,
              backgroundColor: COLORS.red,
              borderRadius: 4,
              barPercentage: 0.6,
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { position: "top" } },
          scales: {
            x: { grid: { display: false } },
            y: { beginAtZero: true, grid: { color: "#f1f5f9" }, ticks: { precision: 0 } }
          }
        }
      });
    }

    // ─── Rate Limits ───
    function renderRateLimits(rateLimits) {
      const gpm = rateLimits.global_per_minute || {};
      const used = gpm.used || 0;
      const limit = gpm.limit || 20;
      const pct = Math.min(Math.round((used / limit) * 100), 100);

      const fill = document.getElementById("rateFill");
      fill.style.width = pct + "%";
      fill.style.background = pct < 50 ? COLORS.green : pct < 80 ? COLORS.amber : COLORS.red;

      document.getElementById("rateText").textContent =
        `${used} / ${limit} requests/min (${pct}%)`;
    }

    // ─── Init ───
    window.addEventListener("load", () => { loadData("7d"); });
  </script>
</body>
</html>
