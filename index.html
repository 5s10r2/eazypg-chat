<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>OxOtel — Find Your Perfect PG</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>🏠</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-avatar">🏠</div>
    <div class="header-info">
      <div class="header-name">OxOtel</div>
      <div class="header-status">Online · Your PG broker</div>
    </div>
    <div class="header-badge">UAT</div>
    <select class="lang-select" id="langSelect" onchange="setLocale(this.value)">
      <option value="en">EN</option>
      <option value="hi">HI</option>
      <option value="mr">MR</option>
    </select>
    <button class="header-new-chat" onclick="clearChat()" title="New Chat">
      <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
    </button>
  </div>

  <!-- Cold Start Banner -->
  <div class="cold-banner" id="coldBanner">
    <div class="cold-spinner"></div>
    <span id="coldBannerText">Waking up the server — first response may take ~30s</span>
  </div>

  <!-- Chat Area -->
  <div class="chat-area" id="chatArea">
    <div class="welcome-card" id="welcomeCard">
      <div class="welcome-title">Find your perfect PG</div>
      <div class="welcome-subtitle">Your AI broker in Mumbai. Search, compare, and book — all in chat.</div>
      <div class="quick-actions">
        <button class="quick-action" onclick="sendQuick('Show me PGs in Andheri')">
          🔍 PGs in Andheri
          <span class="qa-label">Search by area</span>
        </button>
        <button class="quick-action" onclick="sendQuick('I need a PG under ₹12,000 near Powai')">
          💰 Budget PGs
          <span class="qa-label">Under ₹12k</span>
        </button>
        <button class="quick-action" onclick="sendQuick('What areas in Mumbai are good for working professionals?')">
          📍 Area Guide
          <span class="qa-label">Neighborhoods</span>
        </button>
        <button class="quick-action" onclick="sendQuick('I work at BKC, find me a PG nearby')">
          🏢 Near Office
          <span class="qa-label">Commute-first</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Input Area -->
  <div class="input-area">
    <div class="input-wrapper">
      <textarea id="msgInput" rows="1" placeholder="Message OxOtel…"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"
        oninput="autoGrow(this)"></textarea>
    </div>
    <button class="mic-btn" id="micBtn" onclick="toggleVoiceInput()" title="Voice input">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="1" width="6" height="11" rx="3"/>
        <path d="M19 10v1a7 7 0 0 1-14 0v-1"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
